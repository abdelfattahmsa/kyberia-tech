<!DOCTYPE html>
<html style="background:transparent">
<head>
  <meta charset="utf-8">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent !important; }
    canvas { display: block; width: 100% !important; height: 100% !important; background: transparent !important; }
  </style>
</head>
<body style="background:transparent">
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.179.0/build/three.module.js';

/* ── Renderer (transparent background) ───────────────────────── */
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000000, 0);   // fully transparent clear
document.body.appendChild(renderer.domElement);

/* ── Scene / Camera ───────────────────────────────────────────── */
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 5);

/* ── Lights ───────────────────────────────────────────────────── */
scene.add(new THREE.AmbientLight(0xffffff, 0.9));
const dir = new THREE.DirectionalLight(0xffffff, 0.6);
dir.position.set(4, 4, 3);
scene.add(dir);
const pinkPt = new THREE.PointLight(0xFF2F92, 60, 0, 2);
pinkPt.position.set(0, 0, 4.5);
scene.add(pinkPt);
const purplePt = new THREE.PointLight(0xcc00ff, 25, 0, 2);
purplePt.position.set(-3, 2, 2);
scene.add(purplePt);

/* ── Asterisk (10-ray) — thick bars ──────────────────────────── */
const asterisk = new THREE.Group();
const rayGeo = new THREE.BoxGeometry(0.11, 1.05, 0.11);   // wider, longer
rayGeo.translate(0, 0.525, 0);
const rayMat = new THREE.MeshStandardMaterial({
  color: 0xFF2F92, emissive: 0xFF2F92, emissiveIntensity: 0.7,
  roughness: 0.12, metalness: 0.8,
});
for (let i = 0; i < 10; i++) {
  const ray = new THREE.Mesh(rayGeo, rayMat);
  ray.rotation.z = (i / 10) * Math.PI * 2;
  asterisk.add(ray);
}
const core = new THREE.Mesh(
  new THREE.SphereGeometry(0.2, 32, 32),
  new THREE.MeshStandardMaterial({ color: 0xFF2F92, emissive: 0xFF2F92, emissiveIntensity: 2.2, roughness: 0, metalness: 1 })
);
asterisk.add(core);
scene.add(asterisk);

/* ── Orbit ring 1 ─────────────────────────────────────────────── */
const ring1 = new THREE.Mesh(
  new THREE.TorusGeometry(1.45, 0.014, 8, 120),
  new THREE.MeshStandardMaterial({ color: 0xFF2F92, transparent: true, opacity: 0.28, emissive: 0xFF2F92, emissiveIntensity: 0.4 })
);
ring1.rotation.set(Math.PI / 2.2, 0.25, 0);
scene.add(ring1);

/* ── Orbit ring 2 ─────────────────────────────────────────────── */
const ring2 = new THREE.Mesh(
  new THREE.TorusGeometry(2.0, 0.006, 8, 120),
  new THREE.MeshStandardMaterial({ color: 0xaaaaff, transparent: true, opacity: 0.09 })
);
ring2.rotation.set(Math.PI / 1.5, 0.7, 0.4);
scene.add(ring2);

/* ── Background grid ──────────────────────────────────────────── */
const pts = [];
for (let i = -5; i <= 5; i += 0.85) {
  pts.push(-5, i, -2.8,  5, i, -2.8);
  pts.push(i, -5, -2.8,  i,  5, -2.8);
}
const gridGeo = new THREE.BufferGeometry();
gridGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pts), 3));
scene.add(new THREE.LineSegments(gridGeo,
  new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.032 })
));

/* ── Particles ────────────────────────────────────────────────── */
function particles(count, spread, size, color, opacity) {
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count * 3; i++) pos[i] = (Math.random() - 0.5) * spread;
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  return new THREE.Points(g,
    new THREE.PointsMaterial({ color, size, transparent: true, opacity, sizeAttenuation: true })
  );
}
scene.add(particles(400, 7,  0.05,  0xFF2F92, 0.55));
scene.add(particles(280, 14, 0.03,  0xffffff, 0.18));

/* ── Animation loop ───────────────────────────────────────────── */
let t = 0;
(function animate() {
  requestAnimationFrame(animate);
  t += 0.016;
  asterisk.rotation.z += 0.013 * 0.016 * 60;
  asterisk.position.y  = Math.sin(t * 1.4) * 0.12;
  asterisk.rotation.x  = Math.sin(t * 0.12) * 0.07;
  ring1.rotation.y += 0.17 * 0.016;
  ring2.rotation.x += 0.09 * 0.016;
  renderer.render(scene, camera);
})();

/* ── Resize ───────────────────────────────────────────────────── */
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
