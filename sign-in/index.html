<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Kyberia Tech</title>
  <meta name="robots" content="noindex">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../assets/img/kyberia_mark_transparent.png">

  <!-- Fonts -->
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&family=Spline+Sans+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Clerk SDK (custom domain) -->
  <script defer crossorigin="anonymous" src="https://clerk.kyberia.tech/npm/@clerk/ui@1/dist/ui.browser.js" type="text/javascript"></script>
  <script defer crossorigin="anonymous" data-clerk-publishable-key="pk_live_Y2xlcmsua3liZXJpYS50ZWNoJA" src="https://clerk.kyberia.tech/npm/@clerk/clerk-js@6/dist/clerk.browser.js" type="text/javascript"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:    #FF2F92;
      --pink-lt: #FF5CAD;
      --pink-dk: #CC0066;
      --pink-tn: rgba(255,47,146,.07);
      --black:   #000000;
      --nb:      #0A0A0A;
      --s1:      #111111;
      --s2:      #181818;
      --br:      rgba(255,255,255,.07);
      --br2:     rgba(255,255,255,.12);
      --white:   #FFFFFF;
      --g300:    #AAAAAA;
      --g500:    #666666;
      --fd: 'Spline Sans', system-ui, sans-serif;
      --fb: 'Satoshi', system-ui, sans-serif;
      --fm: 'Spline Sans Mono', ui-monospace, monospace;
      --nav-h: 64px;
      --ease: cubic-bezier(.16,1,.3,1);
    }

    html { font-size: 16px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--fb);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    }

    /* ── Nav ── */
    .kt-nav {
      position: sticky; top: 0; z-index: 100; width: 100%;
      background: rgba(10,10,10,.96); border-bottom: 1px solid var(--br);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    }
    .kt-nav__inner {
      display: flex; align-items: center; justify-content: space-between;
      height: var(--nav-h); padding-inline: clamp(16px, 5vw, 80px);
    }
    .kt-nav__logo {
      font-family: var(--fd); font-weight: 700; font-size: 15px;
      letter-spacing: .04em; color: var(--white); text-decoration: none;
      display: flex; align-items: center; gap: 8px;
    }
    .logo-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--pink);
      animation: pulse 2s ease-in-out infinite; flex-shrink: 0;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(.75)} }

    .kt-nav__back {
      font-family: var(--fm); font-size: 10px; letter-spacing: .1em;
      color: var(--g300); text-decoration: none;
      display: flex; align-items: center; gap: 6px;
      transition: color .2s var(--ease);
    }
    .kt-nav__back:hover { color: var(--white); }

    /* ── Main content ── */
    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: clamp(40px, 8vw, 80px) clamp(16px, 5vw, 80px);
      position: relative; z-index: 1;
    }

    .auth-wrap {
      width: 100%; max-width: 460px;
      display: flex; flex-direction: column; align-items: center; gap: 28px;
    }

    .auth-eyebrow {
      font-family: var(--fm); font-size: 9px; letter-spacing: .22em;
      text-transform: uppercase; color: var(--pink);
    }

    .auth-heading {
      text-align: center; display: flex; flex-direction: column; gap: 8px;
    }
    .auth-heading h1 {
      font-family: var(--fd); font-size: clamp(22px, 3vw, 30px);
      font-weight: 700; letter-spacing: -.01em; color: var(--white);
    }
    .auth-heading p {
      font-size: 14px; color: var(--g300); line-height: 1.5;
    }

    #clerk-mount { width: 100%; }

    .auth-loading {
      width: 100%; padding: 48px 24px;
      background: var(--s1); border: 1px solid var(--br2);
      display: flex; align-items: center; justify-content: center;
      color: var(--g500); font-family: var(--fm);
      font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
    }

    .auth-error {
      color: var(--pink); font-family: var(--fm); font-size: 11px;
      letter-spacing: .06em; text-align: center; padding: 16px;
      border: 1px solid rgba(255,47,146,.3); background: rgba(255,47,146,.07);
    }

    /* Force Clerk component to use full width */
    #clerk-mount > * { width: 100% !important; }
    #clerk-mount .cl-rootBox { width: 100% !important; }
    #clerk-mount .cl-card { width: 100% !important; }
  </style>
</head>
<body>

<nav class="kt-nav">
  <div class="kt-nav__inner">
    <a class="kt-nav__logo" href="/">
      <span class="logo-dot"></span>KYBERIA TECH
    </a>
    <a class="kt-nav__back" href="/">← Back to site</a>
  </div>
</nav>

<main>
  <div class="auth-wrap">
    <span class="auth-eyebrow">Account Access</span>
    <div class="auth-heading">
      <h1>Welcome back</h1>
      <p>Sign in to your Kyberia Tech account</p>
    </div>
    <div id="clerk-mount">
      <div class="auth-loading">Loading&hellip;</div>
    </div>
  </div>
</main>

<script>
(function () {
  var appearance = {
    variables: {
      colorPrimary:         '#FF2F92',
      colorBackground:      '#111111',
      colorText:            '#FFFFFF',
      colorTextSecondary:   '#AAAAAA',
      colorInputBackground: '#181818',
      colorInputText:       '#FFFFFF',
      colorNeutral:         '#AAAAAA',
      borderRadius:         '0px',
      fontFamily:           "'Satoshi', system-ui, sans-serif",
      fontFamilyButtons:    "'Spline Sans', system-ui, sans-serif",
      fontSize:             '14px',
    }
  };

  function mountClerk() {
    var clerk = window.Clerk;
    if (!clerk) return;

    if (clerk.user) {
      window.location.replace('/');
      return;
    }

    var mount = document.getElementById('clerk-mount');
    mount.innerHTML = '';
    clerk.mountSignIn(mount, {
      appearance: appearance,
      fallbackRedirectUrl: '/',
      signUpUrl: '/sign-up',
    });
  }

  // defer scripts are guaranteed to run before window.load
  window.addEventListener('load', mountClerk);
  // also catch clerk:loaded in case it fires first
  document.addEventListener('clerk:loaded', mountClerk, { once: true });
})();
</script>

</body>
</html>
